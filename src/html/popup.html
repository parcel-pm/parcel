<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="/js/popup.js" type="module" defer></script>
        <link rel="stylesheet" href="/css/popup.css" />
        <title>Popup</title>
    </head>
    <body>
        <template id="parcel-detail-template">
            <style>
                :host {
                    background-color: var(--color-modal-bg);
                    color: var(--color-modal-text);
                }
                div,
                parcel-value {
                    height: max-content;
                    background-color: var(--color-modal-item-bg);
                    border: 1px solid var(--color-modal-item-border);
                    border-radius: 2px;
                    parcel-plaintext-line:hover {
                        background-color: var(--color-modal-item-focus);
                    }
                }
            </style>
        </template>
        <template id="parcel-value-template">
            <style>
                :host {
                    align-items: center;
                    color: var(--color-modal-text);
                    display: flex;
                    & > * {
                        padding: 5px;
                    }
                }
                span,
                .value-container {
                    &.label {
                        background-color: var(--color-modal-bg-invert);
                        border-radius: 2px 0 0 2px;
                        color: var(--color-modal-text-invert);
                        width: 68px;
                        text-align: center;
                    }
                    &.char {
                        &.punct {
                            color: var(--color-modal-highlight-1);
                        }
                        &.digit {
                            color: var(--color-modal-highlight-2);
                        }
                    }
                    &.spacer {
                        flex-grow: 1;
                    }
                }
                .value-container {
                    box-sizing: border-box;
                    display: inline-flex;
                    flex-grow: 1;
                    gap: 0 8px;
                    padding-left: 8px;
                }
                .copy {
                    border: none;
                    background: url("/img/icon-copy.svg") no-repeat center;
                    height: 16.5px;
                    width: 16.5px;
                }
                :host-context(.context-popup) .copy {
                    display: none;
                }
            </style>
            <span class="label"></span>
            <div class="value-container">
                <span class="value"></span>
                <span class="spacer"></span>
                <button class="copy"></button>
            </div>
        </template>
        <template id="parcel-plaintext-line-template">
            <style>
                :host {
                    border-bottom: 1px solid var(--color-modal-item-focus);
                    display: flex;
                    align-items: center;
                    gap: 10px;
                }
                :host(:last-child) {
                    border-bottom: none;
                }
                .line {
                    flex-grow: 1;
                    display: inline-flex;
                    gap: 5px;
                    overflow: hidden;
                    white-space: nowrap;
                    min-width: 0;
                    &:before {
                        background-color: var(--color-modal-item-focus);
                        color: var(--color-modal-highlight-1);
                        counter-increment: line;
                        content: counter(line);
                        display: inline-block;
                        flex-shrink: 0;
                        padding-right: 5px;
                        text-align: right;
                        width: 20px;
                    }
                }
                .copy {
                    border: none;
                    background: url("/img/icon-copy.svg") center center no-repeat;
                    height: 14px;
                    width: 14px;
                    margin-left: -5px;
                }
                :host-context(.context-popup) .copy {
                    display: none;
                }
            </style>
            <code class="line"></code>
            <button class="copy"></button>
        </template>
        <div id="modal-shade" class="hidden"></div>
        <div id="search">
            <span id="origin"></span>
            <input type="text" id="searchPattern" class="selected" />
        </div>
        <ul id="entries"></ul>
    </body>
</html>
