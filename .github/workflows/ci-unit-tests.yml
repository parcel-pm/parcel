name: CI Unit Tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  make-test:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: Install dependencies
        run: npm install jsdom prettier

      - name: Run tests
        run: make test
